<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    {% if post.status == 0 %}
        <h2>{{post.title}}</h2>
        <p>not published yet</p>
    {% else %}
        <h2>{{post.title}}</h2>
        <p>{{post.content}}</p>
        <small>{{post.published_date}}</small>
    {% endif %}
  
</body>

</html
